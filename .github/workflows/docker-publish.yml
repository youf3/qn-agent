name: Docker-Publish

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 7 * * *' # Every day at 07:00 UTC
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  discover:
    name: Discover Build Targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-targets.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - id: set-targets
        run: |
          TARGETS=()
          echo "Checking for targets on image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # 1. Handle explicit tag push
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            if [[ "$TAG" == v* ]]; then
              echo "Detected push trigger for tag: $TAG"
              TARGETS+=("{\"ref\":\"$TAG\",\"type\":\"tag\"}")
            fi
          fi

          # 2. Handle scheduled/manual sync
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Performing discovery sync..."

            # Check develop for activity in last 24h
            COMMIT_COUNT=$(git rev-list --count --since="24 hours ago" origin/develop 2>/dev/null || echo 0)
            echo "Commits on develop in last 24h: $COMMIT_COUNT"
            if [ "$COMMIT_COUNT" -gt 0 ] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "Adding 'develop' to build targets."
              TARGETS+=("{\"ref\":\"develop\",\"type\":\"branch\"}")
            fi

            # Check for missing v* tags in registry
            ALL_TAGS=$(git tag -l 'v*')
            echo "Found local v* tags: $ALL_TAGS"
            for tag in $ALL_TAGS; do
              echo "Inspecting registry for tag: $tag"
              if ! docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag > /dev/null 2>&1; then
                echo "Result: Tag $tag is missing from registry. Adding to build list."
                TARGETS+=("{\"ref\":\"$tag\",\"type\":\"tag\"}")
              else
                echo "Result: Tag $tag already exists."
              fi
            done
          fi

          # Deduplicate and format as JSON array for matrix
          if [ ${#TARGETS[@]} -eq 0 ]; then
            echo "targets=[]" >> $GITHUB_OUTPUT
          else
            # Create a valid JSON array of objects
            JSON=$(printf '%s\n' "${TARGETS[@]}" | sort -u | jq -s -c .)
            echo "targets=$JSON" >> $GITHUB_OUTPUT
            echo "Final build targets: $JSON"
          fi

  build:
    name: Build ${{ matrix.target.ref }}
    needs: discover
    if: needs.discover.outputs.targets != '[]' && needs.discover.outputs.targets != ''
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        target: ${{ fromJson(needs.discover.outputs.targets || '[]') }}
      fail-fast: false
    
    steps:
      - name: Checkout main branch (for latest Dockerfile)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # If it's a tag, use semver and exact tag
            type=raw,value=${{ matrix.target.ref }},enable=${{ matrix.target.type == 'tag' }}
            type=semver,pattern={{version}},value=${{ matrix.target.ref }},enable=${{ matrix.target.type == 'tag' }}
            
            # If it's develop, use develop and a persisted date tag
            type=raw,value=develop,enable=${{ matrix.target.ref == 'develop' }}
            type=raw,value=develop-{{date 'YYYYMMDD'}},enable=${{ matrix.target.ref == 'develop' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          build-args: |
            BRANCH=${{ matrix.target.ref }}

  test-pull:
    name: Verify ${{ matrix.target.ref }}
    runs-on: ubuntu-latest
    needs: [discover, build]
    if: needs.discover.outputs.targets != '[]' && needs.discover.outputs.targets != ''
    strategy:
      matrix:
        target: ${{ fromJson(needs.discover.outputs.targets || '[]') }}
    steps:
      - name: Test Docker Image Pull
        run: |
          docker logout ${{ env.REGISTRY }}
          echo "Testing pull of ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target.ref }}..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target.ref }}
          echo "Success."